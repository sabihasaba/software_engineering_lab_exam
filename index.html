<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostBook</title>
    <link rel="stylesheet" href="./styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Welcome to Post Book</h1>
    <div class="login-form">
        <h3>Please Login</h3>
        <form>
            <input type="text" name="user-id" id="user-id" placeholder="Input User Name">
            <input type="password" name="" id="password" placeholder="Enter your Password">
            </form>
            <button class="login-btn" onclick="handleLogin()">Login</button>
    </div>

    <div id="user-login-error" class="error hidden">
        <h3>User Id not found or Password is Wrong! Please try Again!</h3>
    </div>

    <script src="./Frontend/js/login.js"></script>
    
</body>
</html>
